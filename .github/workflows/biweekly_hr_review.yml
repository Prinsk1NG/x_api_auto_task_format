name: Bi-Weekly HR Manager

on:
  # 每月 1 号和 15 号的凌晨 2 点（UTC时间）执行考核
  schedule:
    - cron: '0 2 1,15 * *'
    
  # 允许手动随时触发考核
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run HR Manager Script
        run: python hr_manager.py

      - name: Commit and Push Updated Lists
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add whales.txt experts.txt data/account_stats.json
          git commit -m "🤖 HR Bot: 自动淘汰水军、提拔巨鲸与重置报表" || echo "No changes to commit"
          git push
