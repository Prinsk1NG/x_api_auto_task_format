name: 硅谷情报局自动任务 (V10.8)

on:
  # 定时触发：每天北京时间早上 8:00 (对应 UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发：允许在 GitHub Actions 页面点击 "Run workflow" 随时测试
  workflow_dispatch:
    inputs:
      test_mode:
        description: '是否开启测试模式 (true/false)'
        required: true
        default: 'false'

# 🚨 极其重要：赋予 Action 修改仓库文件的权限
permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，避免 Push 冲突

      - name: 2. 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          # 🚨 必须包含 xai-sdk 用于调用 Grok 模型
          pip install requests xai-sdk
          
      - name: 4. 执行情报搜集与分析脚本
        env:
          # 基础情报 API
          twitterapi_io_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          
          # 逻辑与生图 API
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          
          # 飞书分发渠道
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}     # 调试群
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }} # 核心主群
          
          # 运行模式控制
          # 如果手动触发时选择了测试模式，则优先使用输入值；否则默认关闭测试
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          # 确保文件名与您仓库中的 Python 文件名一致
          python x_api_auto_task_xai_xml.py

      - name: 5. 自动保存每日快照与记忆账本
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 🚨 核心改动：git add data/ 确保当天生成的日期文件夹被上传
          # 同时保存记忆账本、账号统计、以及人员名单
          git add data/ character_memory.json account_stats.json whales.txt experts.txt || true
          
          git commit -m "🤖 [Daily Intelligence] Archive reports, raw tweets and update memory bank" || echo "No changes to commit"
          git push
